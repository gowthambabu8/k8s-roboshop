apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: catalogue
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongo:27017/catalogue"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: catalogue
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: catalogue
  template:
    metadata:
      name: catalogue
      labels:
        project: roboshop
        tier: db
        component: catalogue
    spec:
      containers:
        - name: catalogue
          image: happielearning/catalogue:1.0.0
          resources:
            requests:
              cpu: "100m"
              ram: "150Mi"
            limits:
              cpu: "100m"
              ram: "150Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2

          envFrom:
          - configMapRef:
              name: catalogue

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
    # labels are used for selector
    project: roboshop
    tier: db
    component: catalogue
  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port
